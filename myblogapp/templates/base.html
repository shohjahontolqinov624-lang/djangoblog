<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Blog{% endblock %}</title>
    <style>
        :root {
            --bg: #f6f8ff;
            --surface: #ffffff;
            --accent: #4f46e5;
            --accent-soft: #eef2ff;
            --accent-dark: #4338ca;
            --text: #0f172a;
            --muted: #6b7280;
            --border: #e2e8f0;
            --shadow: 0 28px 80px rgba(15, 23, 42, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--text);
            background: radial-gradient(circle at top left, rgba(79, 70, 229, 0.12), transparent 24%),
                        radial-gradient(circle at bottom right, rgba(37, 99, 235, 0.14), transparent 22%),
                        var(--bg);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: linear-gradient(180deg, rgba(255,255,255,0.7), rgba(255,255,255,0) 45%);
        }

        .wrapper {
            max-width: 1080px;
            margin: 0 auto;
            padding: 1.5rem 1.25rem 2.5rem;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 20;
            backdrop-filter: blur(16px);
            background: rgba(255, 255, 255, 0.82);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
        }

        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            min-height: 72px;
        }

        .logo {
            font-size: 1.35rem;
            font-weight: 900;
            color: var(--accent);
            letter-spacing: 0.08em;
        }

        nav a {
            color: var(--text);
            text-decoration: none;
            font-weight: 700;
        }

        nav a.button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--accent);
            color: #ffffff;
            padding: 0.95rem 1.35rem;
            border-radius: 999px;
            border: none;
            transition: transform 0.2s ease, background 0.2s ease;
            box-shadow: 0 18px 32px rgba(79, 70, 229, 0.18);
        }

        nav a.button:hover {
            transform: translateY(-1px);
            background: var(--accent-dark);
        }

        .hero {
            padding: 2.2rem 1.5rem;
            margin-bottom: 1.8rem;
            border-radius: 32px;
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.12), rgba(255, 255, 255, 0.9));
            border: 1px solid rgba(79, 70, 229, 0.1);
            box-shadow: 0 28px 80px rgba(15, 23, 42, 0.06);
        }

        .hero .eyebrow {
            display: inline-flex;
            margin-bottom: 1rem;
            padding: 0.45rem 0.9rem;
            border-radius: 999px;
            font-size: 0.9rem;
            font-weight: 800;
            letter-spacing: 0.12em;
            background: rgba(79, 70, 229, 0.12);
            color: var(--accent-dark);
        }

        .hero-title {
            font-size: clamp(2.35rem, 4vw, 3.8rem);
            line-height: 1.03;
            max-width: 11ch;
            margin-bottom: 1rem;
        }

        .hero-copy {
            max-width: 45rem;
            color: var(--muted);
            line-height: 1.8;
            font-size: 1.05rem;
        }

        .card-grid {
            display: grid;
            gap: 1.35rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid rgba(226, 232, 240, 0.85);
            border-radius: 28px;
            box-shadow: var(--shadow);
            padding: 1.75rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 32px 90px rgba(15, 23, 42, 0.12);
        }

        h1,
        h2,
        h3,
        p,
        label {
            margin: 0;
        }

        h1 {
            font-size: clamp(1.9rem, 4vw, 3.2rem);
            line-height: 1.03;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 0.6rem;
        }

        .meta {
            display: inline-block;
            margin-top: 0.85rem;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .muted {
            color: var(--muted);
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.85rem;
            align-items: center;
            margin-top: 1.4rem;
        }

        .button,
        .button-secondary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            padding: 0.95rem 1.2rem;
            font-weight: 700;
            text-decoration: none;
            transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
        }

        .button:hover,
        .button-secondary:hover {
            transform: translateY(-1px);
        }

        .button-secondary {
            background: rgba(79, 70, 229, 0.08);
            color: var(--accent-dark);
            border: 1px solid rgba(79, 70, 229, 0.18);
        }

        .button {
            background: var(--accent);
            color: #ffffff;
            border: 1px solid transparent;
        }

        .button:hover {
            background: var(--accent-dark);
        }

        .form-field {
            display: grid;
            gap: 0.65rem;
            margin-bottom: 1.3rem;
        }

        label {
            font-size: 0.95rem;
            font-weight: 700;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 1rem 1.1rem;
            border: 1px solid rgba(226, 232, 240, 0.95);
            border-radius: 20px;
            background: #f8fafc;
            color: var(--text);
            font: inherit;
            outline: none;
        }

        input[type="text"]:focus,
        textarea:focus {
            border-color: rgba(79, 70, 229, 0.5);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.08);
        }

        textarea {
            min-height: 180px;
            resize: vertical;
        }

        button.primary {
            border: none;
            background: var(--accent);
            color: #ffffff;
            padding: 1rem 1.3rem;
            border-radius: 18px;
            cursor: pointer;
            font-weight: 700;
        }

        button.primary:hover {
            background: var(--accent-dark);
        }

        footer {
            text-align: center;
            color: var(--muted);
            font-size: 0.95rem;
            padding-top: 1rem;
        }

        @media (max-width: 860px) {
            .wrapper {
                padding: 1rem;
            }

            .hero {
                padding: 1.8rem 1rem;
            }

            .card {
                padding: 1.4rem;
            }
        }

        @media (max-width: 640px) {
            .actions {
                flex-direction: column;
                align-items: stretch;
            }

            nav {
                flex-direction: column;
                align-items: stretch;
            }

            .logo {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <header class="wrapper">
        <nav>
            <div class="logo">My Blog</div>
            <a href="/" class="button">Bosh sahifa</a>
        </nav>
    </header>
    <main class="wrapper">
        {% block content %}{% endblock %}
    </main>
    <footer class="wrapper">
        <p>Oddiy blog loyihasi</p>
    </footer>
</body>
</html>
