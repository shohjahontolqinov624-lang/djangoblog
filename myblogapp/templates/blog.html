{% extends "base.html" %}

{% block title %}{{ blog.title }}{% endblock %}

{% block content %}
    <article class="card">
        <p class="eyebrow">Blog tafsiloti</p>
        <h1>{{ blog.title }}</h1>
        <p class="muted" style="margin-top:0.85rem;">{{ blog.shortdesc }}</p>
        <div style="margin:1.8rem 0; color:var(--text); line-height:1.85; font-size:1.05rem;">
            {{ blog.longdesc }}
        </div>
        <div class="actions">
            <a href="{% url 'home' %}" class="button-secondary">Ortga qaytish</a>
            <a href="{% url 'editblog' blog.id %}" class="button">Tahrirlash</a>
            <a href="{% url 'deleteblog' blog.id %}" class="button-secondary">O'chirish</a>
        </div>
    </article>
{% endblock %}
